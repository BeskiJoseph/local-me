name: testpro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  
  flutter:
    sdk: flutter
  intl: ^0.20.2
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.3.0

  cupertino_icons: ^1.0.8
  video_player: ^2.8.1 
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.2
  
  # Firebase dependencies
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1   
  cloud_firestore: ^6.1.2
  geocoding: ^4.0.0
  http: ^1.6.0
  socket_io_client: ^2.0.2
  cloud_functions: ^6.0.6
  timeago: ^3.7.0
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^18.0.1
  cached_network_image: ^3.4.1
  package_info_plus: ^9.0.0
  share_plus: 10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.1
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.6.3
  build_runner: ^2.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
    
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600  
